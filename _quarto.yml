project:
  type: website
  render:
    - "*.qmd"
  resources:
    - "resources/"
    - "CNAME"

website:
  title: "Research Ring"
  favicon: "favicon.png"
  page-footer:
    left: "© 2026 [ALERRT Center](https://alerrt.org) · Texas State University"
    right: "Research Ring &nbsp; [<i class='bi bi-github' style='font-size: 1.4rem;'></i>](https://github.com/ALERRT-Research/PROJ_researchring_website){target='_blank'}"
  navbar:
    background: "#501214"
    foreground: "#f8f4ee"
    logo: "resources/alerrt_banner.png"
    logo-alt: "ALERRT Center"
    right:
      - href: index.qmd
        text: Home
      - href: research_process_home.qmd
        text: Resources

  sidebar:
    - title: "Ring Resources"
      style: docked
      background: dark
      collapse-level: 1
      contents:
        - research_process_home.qmd
        - section: "Conducting Research"
          contents:
            - research_process_getting_started.qmd
            - research_process_executing_a_proj.qmd
            - research_process_working_with_a_team.qmd
            - research_process_publishing_in_a_journal.qmd
            - research_process_wrapping_up.qmd
        - section: "Working with R"
          contents:
            - r_quarto_website_github_pages.qmd
            - r_quarto_custom_domain.qmd
        - section: "Datasets"
        - section: "Templates"
        - section: "Texas State"
          contents:
            - txst_travel.qmd
            - txst_links.qmd
        - section: "Training Materials"
          contents:
            - training_opxr.qmd
            - training_tobii.qmd
        - lexical_stowaways.qmd

    - title: "Public-Facing"
      style: docked
      background: dark
      collapse-level: 1
      contents:
        - index.qmd
        - section: "Research"
          href: public_research.qmd
          contents:
            - public_output.qmd
            - public_in_progress.qmd
            - public_reports.qmd
        - public_staff.qmd
        - public_grants.qmd
        - public_media.qmd
        - text: "Get in Touch"
          href: public_work_with_us.qmd

format:
  html:
    theme: lux
    css: styles.css
    toc: true
    include-in-header: _auth-gate-include.html

execute:
  freeze: auto
