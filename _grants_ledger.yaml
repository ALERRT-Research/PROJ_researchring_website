# _grants_ledger.yaml
# ─────────────────────────────────────────────────────────────────
# Authoritative source for grant amounts and award counts.
# The portfolio stat block on public_grants.qmd is computed from this
# file — do NOT manually edit the hardcoded total on that page.
#
# FIELD REFERENCE
# ───────────────
# id          REQUIRED  Must match the anchor ID in public_grants.qmd (e.g., grant-rgvrc-2026)
# name        REQUIRED  Short display name
# funder      REQUIRED  Funding agency or organization
# year        REQUIRED  Award year (or first year for multi-year entries)
# amount      REQUIRED  Dollar amount as a plain integer (ALERRT's share for subawards)
# n_awards    REQUIRED  Number of individual awards this entry represents
#                       (1 for most entries; 8 for PASS 2017–2024)
# subaward    OPTIONAL  Set to true if this is a subaward (not a prime award).
#                       Subawards are included in the dollar total but excluded
#                       from the award count.
# note        OPTIONAL  Free-text annotation (e.g., total project amount for subawards)
#
# HOW TO ADD A NEW GRANT
# ──────────────────────
# 1. Add a new entry at the TOP of this list.
# 2. Add the full narrative entry to public_grants.qmd.
# 3. Re-render: quarto render public_grants.qmd
# 4. The portfolio stat updates automatically — no manual arithmetic needed.
# ─────────────────────────────────────────────────────────────────

