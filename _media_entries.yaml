- date: "2026-05-20"
  id: "sia-report-2026"
  type: announcement
  source: ALERRT Research Ring
  title: "The Role of Locked Doors and Access Control in School-Based Active Shooter Events"
  landing_title: Hunter and team publish SIA-funded report on door locks in K–12 school shootings
  url: "resources/reports/report_2026_sia_locked_doors.pdf"
  landing_url: "public_reports.html#report-sia-2026"
  images:
    - "resources/reports/report_2026_sia_locked_doors.png"
  description: >
    The ALERRT Research Ring has published the final report from its
    [SIA-funded study](public_grants.html#grant-sia-2025) on door locks and
    physical access-control measures in K–12 active shooter events. Drawing on
    54 completed events between 2000 and 2025, four averted incidents, and
    case studies of Uvalde (2022) and Evergreen High School (2025), the report
    finds that noncompliance — not hardware failure — is the dominant failure
    mode: 61.7% of doors involved in attacks were unlocked or propped open at
    the time of the incident. The report concludes with eight evidence-based
    recommendations for school administrators, security professionals, and
    policymakers.

