- date: "2026-01-01"
  type: news
  source: Spectrum News 1
  title: Study finds police officers face higher long-term health risks than general population
  landing_title: J.C. Barnes, co-author on ALERRT-led Lancet study, featured in Spectrum News on officer health risks
  url: "https://spectrumnews1.com/oh/columbus/news/2025/12/31/blue-ash-police-department--chief-roger-pohlman--university-of-cincinnati--jc-barnes--officer-mortality--research-study--lancet-health"
  description: "Features J.C. Barnes (University of Cincinnati), co-author of the ALERRT-led officer mortality study published in The Lancet Regional Health — Americas. The study analyzed over 15,000 law enforcement officer deaths, finding that officers face elevated long-term health risks from heart disease, cancer, and suicide compared to the general population."

- date: "2025-12-17"
  type: podcast
  source: Policing Matters Podcast (Police1)
  title: Can VR training create real stress for real-world police decisions?
  landing_title: Hunter appears on Policing Matters to discuss whether VR training can create real stress for real-world police decisions
  url: "https://www.police1.com/police-training/can-vr-training-create-real-stress-for-real-world-police-decisions"
  description: Hunter Martaindale discusses ALERRT Center research examining whether virtual reality scenarios can trigger stress responses comparable to live training, and where VR can — and can't — replace hands-on physical skills training.

- date: "2024-10-15"
  type: podcast
  source: "Trainer's Bullpen"
  episode: Episode 39
  title: VR Training Elicits Similar Stress Response as Scenario-Based Training
  landing_title: Hunter appears on Trainer's Bullpen (Ep. 39) to discuss VR training stress response research
  url: "https://www.youtube.com/watch?v=leollcSg-5E"
  description: Hunter Martaindale discusses research findings showing that virtual reality-based training produces stress responses comparable to traditional scenario-based training — with implications for how agencies can use VR to prepare officers for high-stakes situations.
