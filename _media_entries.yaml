# _media_entries.yaml
# ─────────────────────────────────────────────────────────────────
# Research Ring — Media & News entries
#
# HOW TO ADD A NEW ENTRY
# ──────────────────────
# 1. Add a new block at the TOP of this list (keep newest first).
# 2. Fill in all required fields: date, type, source, title, url.
# 3. Add optional fields as needed.
# 4. Re-render: `quarto render` or render index.qmd + public_media.qmd.
#    Both pages update automatically — no other files need editing.
#
# FIELD REFERENCE
# ───────────────
# date          REQUIRED  ISO format: YYYY-MM-DD
# type          REQUIRED  One of: news | podcast | announcement
# source        REQUIRED  Outlet, show, or issuing org
# title         REQUIRED  Headline or episode title — link text on media page
# url           REQUIRED  Full URL (omit only for announcements with no external link)
# id            OPTIONAL  Short slug, e.g. "perf-2026". When present, two things happen:
#                         (1) The entry gets an HTML anchor on the media page.
#                         (2) The landing page news strip links to that anchor
#                             (public_media.html#<id>) instead of the external URL.
#                         Always add an id. Without one, the landing strip item links
#                         to the top of the media page rather than the specific entry.
# landing_url   OPTIONAL  Override the link destination on the landing page news strip.
#                         By default, strip items link to public_media.html#<id>.
#                         Set this to redirect to a different page (e.g. a report or
#                         grant entry) instead of the media page.
# landing_title OPTIONAL  Short description for the landing page news strip.
#                         If omitted, `title` is used instead.
#                         ALWAYS mention a person. Two cases:
#                           - Research team member: first name only is fine.
#                             Example: "Hunter appears on X to discuss Y"
#                           - External person: name + their connection to ALERRT.
#                             Example: "J.C. Barnes, co-author on ALERRT-led Lancet
#                             study, featured in Spectrum News piece on officer health"
#                         Keep it under ~120 characters so it wraps cleanly on mobile.
# episode       OPTIONAL  Episode label, e.g. "Episode 39" — podcasts only
# description   OPTIONAL  1–3 sentences shown on the media page.
#                         news:         cite ALERRT involvement and research context
#                         podcast:      summarize what was discussed
#                         announcement: full announcement body
#
# TYPE GUIDE
# ──────────
# news          Third-party coverage citing ALERRT research (newspaper, TV, web)
# podcast       Podcast episodes, video interviews, or media appearances
# announcement  Internal RR news: grants, awards, new projects, milestones
# ─────────────────────────────────────────────────────────────────

- date: "2026-07-01"
  id: "erpo-rgvrc-2026"
  type: announcement
  source: ALERRT Research Ring
  title: "New Grant — Extreme Risk Protection Orders and Firearm Suicide in New York"
  landing_title: "Hunter and Peter awarded RGVRC grant to study Extreme Risk Protection Order effects on firearm suicide"
  landing_url: "public_grants.html#grant-rgvrc-2026"
  description: >
    The Research Ring has been awarded a grant from the Regional Gun Violence
    Research Consortium to study the effects of Extreme Risk Protection Orders
    (ERPOs) on firearm suicide in New York. The project, led by Hunter with
    Peter as co-PI, uses two complementary quasi-experimental approaches: a
    multi-state difference-in-differences design and a within-New York
    county-level panel analysis. See the [full grant entry](public_grants.html#grant-rgvrc-2026)
    for details.

