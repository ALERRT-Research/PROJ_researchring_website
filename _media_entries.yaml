  landing_title: Hunter and team's SIA-funded school shooting study covered by Business Insider
  url: "https://markets.businessinsider.com/news/stocks/texas-state-university-s-alerrt-center-releases-groundbreaking-research-on-active-shooter-events-in-schools-1036180145"
  description: >
    Press coverage of the Research Ring's [SIA-funded report on door locks and
    access control in K–12 active shooter events](public_reports.html#report-sia-2026).
    Hunter Martaindale, director of research at ALERRT and lead researcher on the
    report, is quoted: "Nearly two-thirds of the doors in our dataset were unlocked
    or propped open at the moment of attack. The hardware only protects students,
    teachers and staff when it is consistently used."

- date: "2026-03-23"
  id: "secured-doors-2026"
  type: announcement
  source: ISC West (International Security Conference & Exposition)
  title: "Secured Doors Save Lives: Research on School-Based Active Shooter Events"
  landing_title: Hunter, Jack, and Joe present SIA-funded school door security findings at ISC West
  images:
    - "resources/media/sia_conferences.png"
  description: >
    Hunter, Jack, and Joe presented findings from the Research Ring's
    [SIA-funded study on door locks in school-based active shooter
    events](public_grants.html#grant-sia-2025) at ISC West (International
    Security Conference & Exposition) in Las Vegas, NV (March 23–27, 2026).
    Their talk, "Secured Doors Save Lives: Research on School-Based Active
    Shooter Events," examined how physical security features — particularly
    door locks and access-control measures — affected outcomes across 54 K–12
    shooting incidents. The same presentation will be given at the DHI Annual
    Conference (Door and Hardware Institute) in Nashville, TN, May 27–29.

