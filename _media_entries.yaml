# _media_entries.yaml
# ─────────────────────────────────────────────────────────────────
# Research Ring — Media & News entries
#
# HOW TO ADD A NEW ENTRY
# ──────────────────────
# 1. Add a new block at the TOP of this list (keep newest first).
# 2. Fill in all required fields: date, type, source, title, url.
# 3. Add optional fields as needed.
# 4. Re-render: `quarto render` or render index.qmd + public_media.qmd.
#    Both pages update automatically — no other files need editing.
#
# FIELD REFERENCE
# ───────────────
# date          REQUIRED  ISO format: YYYY-MM-DD
# type          REQUIRED  One of: news | podcast | announcement
# source        REQUIRED  Outlet, show, or issuing org
# title         REQUIRED  Headline or episode title — link text on media page
# url           REQUIRED  Full URL
# landing_title OPTIONAL  Short description for the landing page news strip.
#                         If omitted, `title` is used instead.
#                         ALWAYS mention a person. Two cases:
#                           - Research team member: first name only is fine.
#                             Example: "Hunter appears on X to discuss Y"
#                           - External person: name + their connection to ALERRT.
#                             Example: "J.C. Barnes, co-author on ALERRT-led Lancet
#                             study, featured in Spectrum News piece on officer health"
#                         Keep it under ~120 characters so it wraps cleanly on mobile.
# episode       OPTIONAL  Episode label, e.g. "Episode 39" — podcasts only
# description   OPTIONAL  1–3 sentences shown on the media page.
#                         news:         cite ALERRT involvement and research context
#                         podcast:      summarize what was discussed
#                         announcement: full announcement body
#
# TYPE GUIDE
# ──────────
# news          Third-party coverage citing ALERRT research (newspaper, TV, web)
# podcast       Podcast episodes, video interviews, or media appearances
# announcement  Internal RR news: grants, awards, new projects, milestones
# ─────────────────────────────────────────────────────────────────

- date: "2026-04-16"
  type: announcement
  source: Police Executive Research Forum (PERF) Annual Meeting
  title: "A national-level assessment of LEO mortality"
  landing_title: Peter presents LEO mortality findings at PERF annual meeting in Los Angeles
  images:
